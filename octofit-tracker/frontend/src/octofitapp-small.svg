<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="logoGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0dcaf0" />
      <stop offset="100%" stop-color="#6610f2" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.2" />
    </filter>
  </defs>
  <rect x="10" y="10" width="100" height="100" rx="24" fill="url(#logoGradient)" filter="url(#shadow)" />
  <text x="50%" y="54%" text-anchor="middle" dominant-baseline="middle" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700" fill="#ffffff">OF</text>
  <text x="50%" y="82%" text-anchor="middle" dominant-baseline="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff" opacity="0.8">OctoFit</text>
</svg>
